# PasteClean Nginx site template.
# Placeholders {{DOMAIN}}, {{PUBLIC_PORT}}, {{INTERNAL_PORT}}, {{INSTALL_DIR}}
# are substituted by install.sh at install time.

server {
    listen {{PUBLIC_PORT}};
    server_name {{DOMAIN}};

    root {{INSTALL_DIR}}/public;
    index index.html;

    set $paste_clean_api http://127.0.0.1:{{INTERNAL_PORT}};

    # Security / privacy headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "interest-cohort=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' https://api.allorigins.win https://corsproxy.io https://cdn.tailwindcss.com; img-src 'self' data:;" always;

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|svg|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Service Worker must never be cached
    location = /sw.js {
        add_header Cache-Control "no-cache";
        expires 0;
    }

    # X-Ray redirect resolver API (proxied to the Node app)
    location /api/ {
        proxy_pass $paste_clean_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}